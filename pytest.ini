[pytest]
# Removed Playwright flags. Added -v for verbose output, -s to see print/log statements live, and -x to stop immediately on first failure.
addopts = -v -s -x
testpaths = tests
log_cli = true
log_cli_level = INFO
# Explicit test execution order: TC1 -> TC12
python_files = test_tc01_*.py test_tc02_*.py test_tc03_*.py test_tc04_*.py test_tc05_*.py test_tc06_*.py test_tc07_*.py test_tc08_*.py test_tc09_*.py test_tc10_*.py test_tc11_*.py test_tc12_*.py
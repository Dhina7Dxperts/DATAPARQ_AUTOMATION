[pytest]
# Removed Playwright flags. Added -v for verbose output, -s to see print/log statements live, and -x to stop immediately on first failure.
addopts = -v -s -x
testpaths = tests
log_cli = true
log_cli_level = INFO
# Explicit test execution order: TC1 -> TC2 -> TC3 -> TC4 -> TC5 -> TC6
python_files = test_tc01_*.py test_tc02_*.py test_tc03_*.py test_tc04_*.py test_tc05_*.py test_tc06_*.py